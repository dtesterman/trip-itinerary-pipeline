<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>itinerary-app</title>
    <!-- Print stylesheet: Tailwind CSS is disabled during print (causes Chrome
         print rendering bug where content extends past page edge). This stylesheet
         provides all layout needed for print using plain CSS. -->
    <style id="print-styles">
      @page { margin: 0.5in; }
      @media print {
        /* === Reset === */
        html, body {
          width: 100%; margin: 0; padding: 0;
          font-family: system-ui, -apple-system, sans-serif;
          font-size: 11px; color: #000; background: #fff;
        }
        *, *::before, *::after {
          box-sizing: border-box;
          max-width: 100%;
          min-width: 0;
        }

        /* === Hide non-print elements === */
        [data-no-print], [data-print-only="false"],
        .print\:hidden { display: none !important; }
        [data-print-only] { display: block !important; }

        /* === Root layout: collapse flex to block === */
        .h-screen { display: block; height: auto; }
        #root > div { display: block; height: auto; }

        /* === Sidebar hidden === */
        .hidden.lg\:flex { display: none !important; }

        /* === Main content area === */
        .overflow-hidden, .overflow-y-auto, .overflow-auto {
          display: block; height: auto; overflow: visible;
        }
        .flex-1 { display: block; }

        /* === Content wrapper === */
        .max-w-3xl { max-width: 100%; width: 100%; margin: 0; padding: 0; }

        /* === Day cards === */
        .mb-4 { margin-bottom: 12px; }
        .scroll-mt-4 { page-break-inside: avoid; }

        /* Card container: keep overflow hidden to clip any residual width */
        div.overflow-hidden.border-border\/60,
        div[class*="overflow-hidden"][class*="border-border"] {
          border: 1px solid #ddd;
          border-radius: 8px;
          overflow: hidden;
          margin-bottom: 12px;
        }

        /* Day card header row */
        .border-b.border-border\/40 > .flex.items-center.gap-3,
        div[class*="border-b"] > div[class*="flex items-center gap-3"] {
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 8px 12px;
          background: #f9fafb;
          border-bottom: 1px solid #e5e5e5;
        }

        /* Day badge */
        span[class*="uppercase"][class*="tracking-wider"] {
          display: inline-flex;
          align-items: center;
          padding: 2px 8px;
          border-radius: 4px;
          font-size: 9px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          flex-shrink: 0;
          background: #e5e7eb;
          color: #374151;
        }

        /* Day title area */
        .flex-1.min-w-0 { flex: 1; min-width: 0; }

        /* Day meta (route, driving, stops) */
        div.flex.items-center.gap-3.shrink-0 {
          display: flex; align-items: center; gap: 8px;
          flex-shrink: 0; font-size: 10px; color: #666;
        }

        /* === Stop cards === */
        /* Stop trigger button: render as flex row */
        button.w-full.flex.items-start,
        button[class*="w-full"][class*="flex"][class*="items-start"] {
          display: flex;
          align-items: flex-start;
          gap: 12px;
          padding: 8px 12px;
          width: 100%;
          text-align: left;
          background: none;
          border: none;
          font: inherit;
          color: inherit;
          cursor: default;
        }

        /* Stop emoji/photo placeholder */
        div[class*="w-20"][class*="h-14"] {
          width: 64px; height: 44px;
          border-radius: 6px;
          flex-shrink: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 18px;
          background: #f3f4f6;
        }

        /* Stop body text */
        button .flex-1.min-w-0,
        button > .flex-1 {
          flex: 1; min-width: 0;
        }

        /* Stop detail section (expanded collapsible) */
        div[class*="pl-\[calc"] {
          padding: 4px 12px 8px 88px;
        }

        /* Detail pills row */
        div.flex.flex-wrap { display: flex; flex-wrap: wrap; gap: 8px; }

        /* Tip bar */
        div.border-t.bg-muted\/30,
        div[class*="border-t"][class*="bg-muted"] {
          padding: 6px 12px;
          background: #f9fafb;
          border-top: 1px solid #e5e5e5;
        }

        /* === Collapsible content: force visible === */
        [data-state="closed"] > [data-radix-collapsible-content],
        [data-radix-collapsible-content] {
          display: block; height: auto; overflow: visible;
        }

        /* === Line clamp override === */
        .line-clamp-1 {
          -webkit-line-clamp: unset;
          -webkit-box-orient: unset;
          display: block;
          overflow: visible;
          white-space: normal;
        }

        /* === Typography === */
        .text-2xl { font-size: 22px; }
        .text-xl { font-size: 18px; }
        .text-lg { font-size: 16px; }
        .text-sm { font-size: 12px; }
        .text-xs { font-size: 11px; }
        .text-\[11px\] { font-size: 10px; }
        .text-\[10px\] { font-size: 9px; }
        .font-semibold { font-weight: 600; }
        .font-bold { font-weight: 700; }
        .leading-tight { line-height: 1.3; }
        .leading-relaxed { line-height: 1.6; }
        .truncate { overflow: visible; text-overflow: clip; white-space: normal; }
        .text-muted-foreground { color: #555; }
        .text-foreground { color: #000; }

        /* === Spacing helpers === */
        .mt-0\.5 { margin-top: 2px; }
        .mb-0\.5 { margin-bottom: 2px; }
        .mb-2 { margin-bottom: 8px; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }

        /* === Images and icons === */
        img, svg { max-width: 64px; height: auto; }
        svg.h-3 { width: 12px; height: 12px; }
        svg.h-4 { width: 16px; height: 16px; }

        /* === Print cost section === */
        .print-cost-section {
          display: block !important;
          page-break-before: always;
        }

        /* === Borders === */
        .border-b { border-bottom: 1px solid #e5e5e5; }
        .border-t { border-top: 1px solid #e5e5e5; }
        .border { border: 1px solid #ddd; }

        /* === Stat cards grid in TripHeader === */
        .grid {
          display: grid;
          gap: 8px;
        }
        .grid-cols-2 {
          grid-template-columns: repeat(3, 1fr);
        }
        /* Each stat card */
        .grid > div {
          border: 1px solid #ddd;
          border-radius: 6px;
          overflow: hidden;
        }
        /* Card content: flex row with icon + text */
        .grid > div > div {
          display: flex;
          align-items: flex-start;
          gap: 8px;
          padding: 8px;
        }
        /* Icon wrapper */
        .grid > div > div > div:first-child {
          background: #f3f4f6;
          border-radius: 4px;
          padding: 4px;
          flex-shrink: 0;
        }
        .grid > div > div > div:first-child svg {
          width: 14px; height: 14px;
        }

        /* === Price badges === */
        span[class*="rounded-full"][class*="font-bold"] {
          display: inline-flex; padding: 1px 6px;
          border-radius: 999px; font-size: 9px; font-weight: 700;
        }

        /* === Lodging badge === */
        span[class*="rounded-full"][class*="items-center"] {
          display: inline-flex; align-items: center; gap: 4px;
          padding: 1px 6px; border-radius: 999px; font-size: 9px;
        }

        /* === Toolbar: hide === */
        .print\:hidden, div[class*="print:hidden"] { display: none !important; }

        /* === Alert / timing note === */
        div[role="alert"],
        div[class*="rounded-lg"][class*="border-blue"] {
          border: 1px solid #bfdbfe;
          border-radius: 6px;
          padding: 8px 12px;
          margin-bottom: 12px;
          font-size: 11px;
          background: #eff6ff;
        }

        /* === TripHeader spacing === */
        .mb-6 { margin-bottom: 16px; }
        .mb-4 { margin-bottom: 12px; }
        .mt-1 { margin-top: 4px; }
        .tracking-tight { letter-spacing: -0.02em; }
        .uppercase { text-transform: uppercase; }
        .tracking-wider { letter-spacing: 0.05em; }
      }
    </style>
